<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Nava Hotel - Dijital Menü - Cafe & Restaurant">
    <title>The Nava Hotel - Dijital Menü</title>
    <link rel="icon" type="image/x-icon" id="favicon" href="">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <script src="/js/lang.js"></script>
</head>
<body class="index-body">

    <div class="index-page">

        <!-- Header -->
        <header class="index-header">
            <div class="index-logo" id="headerLogo">
                <div class="index-logo-text">THE NAVA HOTEL</div>
                <div class="index-logo-sub" id="taglineText">Premium Yemek Deneyimi</div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="index-main">

            <!-- Welcome -->
            <div class="index-welcome">
                <h1 id="welcomeTitle">Dijital Menümüze Hoş Geldiniz</h1>
                <p id="welcomeSubtitle">Yemek deneyiminizi seçin</p>
            </div>

            <!-- Language Pill Toggle -->
            <div class="lang-pill-wrapper">
                <div class="lang-pill-toggle">
                    <button class="lang-pill-btn active" id="btnTR" onclick="switchIndexLang('tr')">
                        <span class="fi fi-tr fi-pill"></span> Türkçe
                    </button>
                    <button class="lang-pill-btn" id="btnEN" onclick="switchIndexLang('en')">
                        <span class="fi fi-gb fi-pill"></span> English
                    </button>
                </div>
            </div>

            <!-- Menu Cards -->
            <div class="index-cards">
                <a href="/cafe.html" class="index-card">
                    <div class="index-card-icon">☕</div>
                    <div class="index-card-content">
                        <h2 class="index-card-title" id="cafeTitle">Cafe Menüsü</h2>
                        <p class="index-card-desc" id="cafeDesc">Kahve, İçecekler &amp; Atıştırmalıklar</p>
                    </div>
                    <div class="index-card-arrow">→</div>
                </a>

                <a href="/restaurant.html" class="index-card">
                    <div class="index-card-icon">🍽️</div>
                    <div class="index-card-content">
                        <h2 class="index-card-title" id="restTitle">Restaurant Menüsü</h2>
                        <p class="index-card-desc" id="restDesc">Tam Yemek Deneyimi</p>
                    </div>
                    <div class="index-card-arrow">→</div>
                </a>
            </div>

        </main>

        <!-- Footer -->
        <footer class="index-footer">
            <p id="copyrightText">&copy; 2024 <span id="hotelName">The Nava Hotel</span>. Tüm hakları saklıdır.</p>
            <div class="index-footer-links">
                <a href="#" id="googleReviewLink" class="review-link" target="_blank" rel="noopener" style="display:none;">
                    ⭐ Bizi Google'da Değerlendirin
                </a>
                <a href="#" id="whatsappLink" class="review-link" target="_blank" rel="noopener" style="display:none; background:#25D366;">
                    💬 WhatsApp
                </a>
            </div>
        </footer>

    </div>

    <script>
        const INDEX_TEXT = {
            tr: {
                welcome: 'Dijital Menümüze Hoş Geldiniz',
                subtitle: 'Yemek deneyiminizi seçin',
                tagline: 'Premium Yemek Deneyimi',
                cafeTitle: 'Cafe Menüsü',
                cafeDesc: 'Kahve, İçecekler & Atıştırmalıklar',
                restTitle: 'Restaurant Menüsü',
                restDesc: 'Tam Yemek Deneyimi',
                googleReview: '⭐ Bizi Google\'da Değerlendirin',
                whatsapp: '💬 WhatsApp',
                titleSuffix: ' - Dijital Menü'
            },
            en: {
                welcome: 'Welcome to Our Digital Menu',
                subtitle: 'Choose your dining experience',
                tagline: 'Premium Dining Experience',
                cafeTitle: 'Cafe Menu',
                cafeDesc: 'Coffee, Beverages & Snacks',
                restTitle: 'Restaurant Menu',
                restDesc: 'Full Dining Experience',
                googleReview: '⭐ Review Us on Google',
                whatsapp: '💬 WhatsApp',
                titleSuffix: ' - Digital Menu'
            }
        };

        function switchIndexLang(lang) {
            Lang.set(lang);
            applyIndexLang();
        }

        function applyIndexLang() {
            const lang = Lang.get();
            const T = INDEX_TEXT[lang] || INDEX_TEXT.tr;
            const isEN = lang === 'en';

            document.documentElement.lang = isEN ? 'en' : 'tr';
            document.getElementById('welcomeTitle').textContent = T.welcome;
            document.getElementById('welcomeSubtitle').textContent = T.subtitle;

            const tagline = document.getElementById('taglineText');
            if (tagline) tagline.textContent = T.tagline;

            document.getElementById('cafeTitle').textContent = T.cafeTitle;
            document.getElementById('cafeDesc').textContent = T.cafeDesc;
            document.getElementById('restTitle').textContent = T.restTitle;
            document.getElementById('restDesc').textContent = T.restDesc;

            document.getElementById('btnTR').classList.toggle('active', !isEN);
            document.getElementById('btnEN').classList.toggle('active', isEN);

            const gr = document.getElementById('googleReviewLink');
            if (gr && gr.style.display !== 'none') gr.textContent = T.googleReview;
            const wa = document.getElementById('whatsappLink');
            if (wa && wa.style.display !== 'none') wa.textContent = T.whatsapp;

            document.title = 'The Nava Hotel' + T.titleSuffix;
        }

        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                const settings = await response.json();
                const isEN = Lang.isEN();

                if (settings.favicon) {
                    document.getElementById('favicon').href = settings.favicon;
                }
                if (settings.logo) {
                    const T = INDEX_TEXT[Lang.get()] || INDEX_TEXT.tr;
                    document.getElementById('headerLogo').innerHTML =
                        `<img src="${settings.logo}" alt="${settings.hotelName}" style="max-height:70px;object-fit:contain;">` +
                        `<div class="index-logo-sub" id="taglineText">${T.tagline}</div>`;
                }
                if (settings.hotelName) {
                    const hn = document.getElementById('hotelName');
                    if (hn) hn.textContent = settings.hotelName;
                    const T = INDEX_TEXT[Lang.get()] || INDEX_TEXT.tr;
                    document.title = settings.hotelName + T.titleSuffix;
                }
                if (settings.copyrightText) {
                    document.getElementById('copyrightText').textContent = settings.copyrightText;
                }
                if (settings.googleReviewUrl) {
                    const T = INDEX_TEXT[Lang.get()] || INDEX_TEXT.tr;
                    const el = document.getElementById('googleReviewLink');
                    el.href = settings.googleReviewUrl;
                    el.style.display = 'inline-block';
                    el.textContent = T.googleReview;
                }
                if (settings.whatsappNumber) {
                    const T = INDEX_TEXT[Lang.get()] || INDEX_TEXT.tr;
                    const el = document.getElementById('whatsappLink');
                    el.href = 'https://wa.me/' + settings.whatsappNumber;
                    el.style.display = 'inline-block';
                    el.textContent = T.whatsapp;
                }
            } catch (e) {
                console.error('Ayarlar yüklenemedi:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyIndexLang();
            loadSettings();
        });
    </script>
</body>
</html>
